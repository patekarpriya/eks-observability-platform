<!DOCTYPE html>
<html>
<head>
    <title>EKS Platform</title>
</head>
<body style="text-align:center; margin-top:100px; font-family:sans-serif;">
    
    <h1>🚀 Frontend Running</h1>
    <p>EKS Observability Platform</p>

    <p id="response">Checking backend...</p>

    <script>
        fetch('http://host.docker.internal:3000')
            .then(response => response.text())
            .then(data => {
                document.getElementById('response').innerText = data;
            })
            .catch(error => {
                document.getElementById('response').innerText = "Backend not reachable ❌";
            });
    </script>

</body>
</html>
